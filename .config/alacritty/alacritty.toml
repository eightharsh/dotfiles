# ---------------- GENERAL ----------------
[general]
import = [
    "~/.config/alacritty/themes/themes/gruvbox_material_medium_dark.toml"
]
live_config_reload = true

[env]
TERM = "xterm-256color"


# ---------------- WINDOW ----------------
[window]
decorations = "Buttonless"
opacity = 0.92
blur = true
dynamic_padding = false
dynamic_title = true
decorations_theme_variant = "Dark"


[window.padding]
x = 8
y = 6

[window.dimensions]
columns = 100
lines = 30


# ---------------- FONT ----------------
[font]
size = 16.5

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Medium"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Medium Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[font.offset]
y = 2


# ---------------- CURSOR ----------------
[cursor]
style = { shape = "Beam", blinking = "on" }
thickness = 0.14
blink_interval = 500
unfocused_hollow = true



# ---------------- SCROLL ----------------
[scrolling]
history    = 50000
multiplier = 4


# ---------------- SELECTION ----------------
[selection]
save_to_clipboard     = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>"


# ---------------- MOUSE ----------------
[mouse]
hide_when_typing = true


# ---------------- KEYBOARD BINDINGS ----------------
[[keyboard.bindings]]
key = "N"
mods = "Command"
action = "SpawnNewInstance"

[[keyboard.bindings]]
key = "W"
mods = "Command|Shift"
action = "Quit"

[[keyboard.bindings]]
chars = "\u001Bb"
key = "Left"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u001Bf"
key = "Right"
mods = "Alt"

[[keyboard.bindings]]
chars = "\u0001"
key = "Left"
mods = "Command"

[[keyboard.bindings]]
chars = "\u0005"
key = "Right"
mods = "Command"
